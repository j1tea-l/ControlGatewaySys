name: integration-mininet

on:
  workflow_dispatch:
  push:
    branches: ["**"]

jobs:
  mininet-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install python-osc pyyaml pytest mininet
      - name: Compile
        run: python -m py_compile main.py OSCCore.py pshu/*.py scripts/*.py tests/integration/*.py topology.py
      - name: Run unified mininet e2e (sudo)
        run: |
          sudo -E python3 tests/integration/run_mininet_e2e.py
      - name: Show report
        run: cat mininet_e2e_report.json
